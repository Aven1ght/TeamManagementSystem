name: teammanagementsystem

services:
  postgres:
    image: postgres:16
    container_name: teammanagementsystem-postgres
    environment:
      POSTGRES_DB: TeamManagementSystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: teammanagementsystem-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: