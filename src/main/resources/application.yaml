spring:
  application:
    name: TeamManagementSystem

  datasource:
    url: jdbc:postgresql://localhost:5432/TeamManagementSystem
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Europe/Kyiv

  data:
    redis:
      port: 6379

  docker:
    compose:
      lifecycle-management: start_only
      enabled: false
logging:
  level:
    org.hibernate.orm: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG