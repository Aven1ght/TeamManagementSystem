services:
  postgres:
    image: postgres:16
    container_name: teammanagementsystem-postgres

    environment:
      POSTGRES_DB: TeamManagementSystem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root

    ports:
      - "5433:5432"

  redis:
    image: redis:latest
    container_name: teammanagementsystem-redis

    ports:
      - "6379:6379"